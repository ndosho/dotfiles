[window]
opacity = 0.0
decorations = "Full"
blur = true 
dynamic_title = true
decorations_theme_variant = "Dark"

[font]
normal = { family = "DejaVuSansM Nerd Font Propo", style = "Oblique" }
bold ={ family = "DejaVuSansM Nerd Font Propo", style = "Bold" }
italic = { family = "DejaVuSansM Nerd Font Propo", style = "Italic" }
bold_italic = { family = "DejaVuSansM Nerd Font Propo", style = "Bold Italic" }
size = 15.0

[bell]
animation = "Ease"
 
[selection]
save_to_clipboard = true

[terminal]
[shell]
program = "/usr/local/bin/fish"

[mouse]
hide_when_typing = true 

[colors]
[colors.primary]
background = "#282828" 
foreground = "#ebdbb2"
[colors.normal]
black = "#282828"
red  =  "#cc241d"
green = "#98971a"
yellow = "#d79921"
blue  = "#458588"
magenta = "#b16286"
cyan = "#689d6a"
white = "#a89984"
[colors.bright]
black = "#928374"
red = "#fb4934"
green = "#b8bb26"
yellow = "#fabd2f"
blue  = "#83a598"
magenta = "#d3869b"
cyan =  "#8ec07c"
white = "#ebdbb2"


